# ════════════════════════════════════════════════════════════════════
# VPN Manager — SoftEther + WireGuard
# Copy .env.example to .env and edit before running:
#   docker compose up -d --build
# ════════════════════════════════════════════════════════════════════

services:

  # ─── SoftEther VPN (L2TP, IKEv2, OpenVPN, SSTP, SSL-VPN) ────────────────
  softether:
    build: ./softether
    container_name: softether
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - SPW=${SE_SERVER_PASSWORD}
      - HPW=${SE_HUB_PASSWORD}
      - USERS=${SE_USERS}
      - PSK=${SE_PSK}
      - PUBLIC_IPS=${PUBLIC_IPS}
      - LAN_IP=${LAN_IP}
    volumes:
      - ./vpn_server.config:/usr/vpnserver/vpn_server.config
    ports:
      - "${PORT_IKEV2}:500/udp"
      - "${PORT_IKEV2_NAT}:4500/udp"
      - "${PORT_L2TP}:1701/udp"
      - "${PORT_OVPN_UDP}:1194/udp"
      - "${PORT_OVPN_TCP}:443/tcp"
      - "${PORT_SSL_ALT}:992/tcp"
      - "${PORT_JSONRPC}:5555/tcp"
    networks:
      - vpn-net

  # ─── WireGuard Peer Management API ───────────────────────────────────────
  wg-api:
    build: ./wg-api
    container_name: wg-api
    restart: unless-stopped
    environment:
      - WG_API_KEY=${WG_API_KEY}
      - WG_CONTAINER=wireguard
      - PORT=8099
      - HOST_WG_DATA=${HOST_WG_DATA}
    volumes:
      - ./wg-data:/wg-data
      - .:/compose
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8099:8099"
    networks:
      - vpn-net

  # ─── Web UI ───────────────────────────────────────────────────────────────
  # network_mode: host puts nginx in the host network namespace — the same
  # place where WireGuard and SoftEther VPN routes (10.13.13.x, 192.168.30.x)
  # exist. This lets VPN clients reach the UI via the server's public IP
  # without any extra routing or iptables rules, exactly like wg-easy did.
  vpn-ui:
    image: nginx:alpine
    container_name: softether-ui
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./wg-data:/wg-data:ro
    depends_on:
      - softether
      - wg-api

  # ─── Host-level hairpin NAT ──────────────────────────────────────────────
  # Runs once at stack startup with network_mode: host so it writes iptables
  # rules into the HOST network namespace (not a container namespace).
  # This is the only way to fix the routing loop for ALL VPN protocols:
  #   - WireGuard clients trying to reach PUBLIC_IPS
  #   - OpenVPN / L2TP / IKEv2 clients trying to reach PUBLIC_IPS
  # Without this, traffic from any VPN client destined for the server's own
  # public IP gets delivered locally by the kernel instead of being forwarded,
  # causing timeouts. wg-easy and Pritunl handled this internally; we do it
  # here at the host level so it works for every protocol at once.
  hairpin:
    image: alpine:latest
    container_name: vpn-hairpin
    restart: "no"
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - PUBLIC_IPS=${PUBLIC_IPS}
      - LAN_IP=${LAN_IP}
      - WG_SUBNET=${WG_SUBNET:-10.13.13.0/24}
      - SE_SUBNET=${SE_SUBNET:-}
    volumes:
      - ./hairpin.sh:/hairpin.sh:ro
    command: sh /hairpin.sh

networks:
  vpn-net:
    driver: bridge
