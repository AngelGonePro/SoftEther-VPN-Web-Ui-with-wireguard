# Copy .env.example to .env and edit before running docker compose up -d

services:

  # ─── SoftEther VPN ──────────────────────────────────────────────────────────
  softether:
    image: siomiz/softethervpn:latest
    container_name: softether
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - SPW=${SE_SERVER_PASSWORD}
      - HPW=${SE_HUB_PASSWORD}
      - USERS=${SE_USERS}
      - PSK=${SE_PSK}
    volumes:
      - ./vpn_server.config:/usr/vpnserver/vpn_server.config
    ports:
      - "${PORT_IKEV2}:500/udp"
      - "${PORT_IKEV2_NAT}:4500/udp"
      - "${PORT_L2TP}:1701/udp"
      - "${PORT_OVPN_UDP}:1194/udp"
      - "${PORT_OVPN_TCP}:443/tcp"
      - "${PORT_SSL_ALT}:992/tcp"
      - "${PORT_JSONRPC}:5555/tcp"
    networks:
      - vpn-net

  # ─── WireGuard ──────────────────────────────────────────────────────────────
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=${SERVER_IP}
      - SERVERPORT=${PORT_WIREGUARD}
      - PEERS=${WG_PEERS}
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0
      - ALLOWEDIPS=0.0.0.0/0
      - LOG_CONFS=true
    volumes:
      - ./wg-data:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${PORT_WIREGUARD}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - vpn-net

  # ─── Web UI ──────────────────────────────────────────────────────────────────
  # Binds to 0.0.0.0 — reachable from any IP (local, public, IPv6) automatically
  vpn-ui:
    image: nginx:alpine
    container_name: softether-ui
    restart: unless-stopped
    ports:
      - "${PORT_WEBUI}:9765"       # Accessible from any IP on this port
    volumes:
      - ./ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./wg-data:/wg-data:ro
    depends_on:
      - softether
    networks:
      - vpn-net

networks:
  vpn-net:
    driver: bridge
