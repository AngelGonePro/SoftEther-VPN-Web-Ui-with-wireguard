server {
    listen 9765;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # SoftEther JSON-RPC proxy
    # Uses 127.0.0.1 + host-mapped port because vpn-ui runs with
    # network_mode: host and cannot resolve Docker service names.
    # Port matches PORT_JSONRPC in .env (default 9555 → container 5555).
    location /api/ {
        proxy_pass https://127.0.0.1:9555/api/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_read_timeout 30s;
        proxy_pass_request_headers on;
        proxy_hide_header WWW-Authenticate;
        proxy_set_header Authorization "";
    }

    # WireGuard peer management API proxy
    # Bound to 127.0.0.1:8099 on the host (never exposed publicly).
    location /wg-api/ {
        proxy_pass http://127.0.0.1:8099/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # WireGuard peer config file downloads
    location ~ ^/wg/(peer[0-9]+)\.conf$ {
        alias /wg-data/$1/$1.conf;
        add_header Content-Disposition 'attachment; filename="$1.conf"';
        add_header Content-Type 'text/plain';
    }
}
