server {
    listen 9765;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Proxy JSON-RPC to softether container via Docker internal DNS
    # "softether" resolves automatically to the container IP on any server
    location /api/ {
        proxy_pass https://softether:5555/api/;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_read_timeout 30s;
        proxy_set_header X-VPNADMIN-PASSWORD $http_x_vpnadmin_password;
        proxy_set_header X-VPNADMIN-HUBNAME "";
        proxy_hide_header WWW-Authenticate;
        proxy_set_header Authorization "";
    }

    # Serve WireGuard peer configs for download
    location /wg/ {
        alias /wg-data/;
        add_header Content-Disposition 'attachment';
    }
}
